# Кастомный дашборд Grafana по метрикам приложения.
# Sidecar Grafana (kube-prometheus-stack) подхватывает ConfigMap по метке grafana_dashboard.
apiVersion: v1
kind: ConfigMap
metadata:
  name: diploma-app-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  diploma-app.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "schemaVersion": 39,
      "title": "Diploma App",
      "tags": ["diploma"],
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "",
      "panels": [
        {
          "id": 1,
          "title": "Requests per second",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {
              "expr": "sum(rate(app_requests_total[1m])) by (path)",
              "legendFormat": "{{path}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Request latency p95 (s)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(app_request_duration_seconds_bucket[5m])) by (le, path))",
              "legendFormat": "{{path}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Total requests",
          "type": "stat",
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 8},
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "targets": [{"expr": "sum(app_requests_total)"}]
        }
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": {}
          }
        ]
      }
    }
