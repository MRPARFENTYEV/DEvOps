name: Terraform infra

on:
  push:
    branches: [master]
    paths: ["diploma-infra/infra/**", ".github/workflows/terraform.yml"]
  pull_request:
    branches: [master]
    paths: ["diploma-infra/infra/**", ".github/workflows/terraform.yml"]

env:
  # Данные для S3-backend (Object Storage). Секреты заводятся в настройках репо.
  AWS_ACCESS_KEY_ID: ${{ secrets.YC_STORAGE_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_STORAGE_SECRET_KEY }}
  # Переменные Terraform через TF_VAR_*.
  TF_VAR_yc_token: ${{ secrets.YC_TOKEN }}
  TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
  TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

defaults:
  run:
    working-directory: diploma-infra/infra

jobs:
  terraform:
    name: plan / apply
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="access_key=${AWS_ACCESS_KEY_ID}" \
            -backend-config="secret_key=${AWS_SECRET_ACCESS_KEY}"

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform validate
        run: terraform validate

      # На pull request — только план, результат постим комментарием в PR.
      - name: Terraform plan
        if: github.event_name == 'pull_request'
        id: plan
        run: terraform plan -no-color -input=false

      - name: Комментарий с планом в PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📖\n\`\`\`\n${{ toJSON(steps.plan.outputs.stdout) }}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output.length > 65000 ? output.substring(0, 65000) + "\n...(truncated)" : output
            });

      # На push в main — применяем изменения.
      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: terraform apply -auto-approve -input=false
